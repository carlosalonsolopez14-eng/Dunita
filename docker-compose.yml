version: '3.9'

services:
  dunita-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dunita-game
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=dunita-db;Database=dunita;Username=postgres;Password=${POSTGRES_PASSWORD:-password}
    depends_on:
      dunita-db:
        condition: service_healthy
    volumes:
      - ./estado_partida.json:/app/estado_partida.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dunita-db:
    image: postgres:15
    container_name: dunita-postgres
    environment:
      - POSTGRES_DB=dunita
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  dunita-docs:
    image: python:3.11-slim
    container_name: dunita-docs
    working_dir: /docs
    command: python -m http.server ${PORT_DOCS:-8080} --bind 0.0.0.0
    ports:
      - "${PORT_DOCS:-8080}:${PORT_DOCS:-8080}"
    volumes:
      - ./Documentacion:/docs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_DOCS:-8080}"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  partidas:
    driver: local

networks:
  dunita-network:
    driver: bridge